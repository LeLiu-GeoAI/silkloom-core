name: Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with Pylance
        run: |
          pip install pylint
          pylint silkloom_core --disable=all --enable=E,F --exit-zero || true

      - name: Test imports
        run: |
          python -c "from silkloom_core import Pipeline, LLMNode, FunctionNode, BaseNode; print('✓ Imports successful')"
